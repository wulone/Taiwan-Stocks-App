<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0A0E13">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="波段電路">
<meta name="description" content="台股中短期波段選股與看盤工具，加到主畫面可像 App 一樣使用">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<title>波段電路｜台股供應鏈選股系統</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/vue/3.5.39/vue.global.prod.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss-browser/4.3.1/index.global.js"></script>
<style type="text/tailwindcss">
  @theme {
    --font-disp: 'Barlow Condensed', sans-serif;
    --font-body: 'Inter', -apple-system, sans-serif;
    --font-mono: 'IBM Plex Mono', monospace;
    --color-bg: #0A0E13;
    --color-surface: #121821;
    --color-surface2: #1A222D;
    --color-line: #232C38;
    --color-gold: #D4A94D;
    --color-up: #E5484D;
    --color-down: #26B27A;
    --color-cyan: #4DAAD4;
    --color-violet: #9B7FD4;
  }
  html,body{background:var(--color-bg);}
  ::-webkit-scrollbar{width:0;height:0;}
  @keyframes spin{to{transform:rotate(360deg);}}
  @keyframes load{0%{left:-40%}100%{left:100%}}
  @keyframes ticker-scroll{0%{transform:translateX(0);}100%{transform:translateX(-50%);}}
  .ticker-track{animation:ticker-scroll 32s linear infinite; white-space:nowrap; display:inline-block;}
  .ticker-track:hover{animation-play-state:paused;}
  .anim-spin{animation:spin .9s linear infinite;}
  .loadbar-inner{animation:load 1s infinite ease-in-out;}
  input[type=date]{
    color-scheme: dark; /* 讓瀏覽器原生日期選擇器(含小日曆圖示)改用淺色，暗色底才看得清楚 */
    color: #E7ECF2;
  }
  input[type=date]::-webkit-calendar-picker-indicator{
    filter: invert(0.85);
    opacity: 0.9;
    cursor: pointer;
  }
</style>
</head>
<body class="bg-bg text-slate-100 font-body pb-20 m-0 min-h-screen">
<div id="app"></div>

<script type="text/x-template" id="app-template">
<div class="max-w-[520px] mx-auto min-h-screen relative" style="background:linear-gradient(180deg,#0B0F16 0%,#0A0E13 220px);">

  <!-- Top bar -->
  <div class="sticky top-0 z-30 bg-[#0A0E13]/92 backdrop-blur-md border-b border-line px-4 pt-3.5 pb-3">
    <div class="flex items-center justify-between">
      <div class="flex items-center gap-[10px]">
        <svg class="w-[26px] h-[26px]" viewBox="0 0 26 26" fill="none">
          <rect x="1" y="1" width="24" height="24" rx="5" stroke="#D4A94D" stroke-width="1.4"/>
          <path d="M7 18 L7 13 L11 13 L11 8 L15 8 L15 15 L19 15 L19 18" stroke="#D4A94D" stroke-width="1.5" fill="none" stroke-linejoin="round"/>
          <circle cx="7" cy="18" r="1.4" fill="#E5484D"/><circle cx="19" cy="18" r="1.4" fill="#E5484D"/>
        </svg>
        <div>
          <div class="font-disp font-bold text-xl tracking-wide leading-none">波段電路</div>
          <div class="text-[10px] text-slate-500 tracking-widest -mt-0.5">TW SUPPLY-CHAIN SWING SCREENER</div>
        </div>
      </div>
      <button @click="onRefresh()" class="flex items-center gap-1.5 bg-surface2 border border-line text-gold text-xs px-3 py-1.5 rounded-full font-mono active:scale-95 transition">
        <svg :class="['w-3.5 h-3.5', loading && 'anim-spin']" viewBox="0 0 24 24" fill="none"><path d="M4 4v5h5M20 20v-5h-5M4.6 15a8 8 0 0 0 14.8 2.5M19.4 9A8 8 0 0 0 4.6 6.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span>{{ loading ? '更新中' : '更新資料' }}</span>
      </button>
    </div>
    <div v-if="loading" class="mt-3">
      <div class="h-0.5 w-full bg-surface2 overflow-hidden relative rounded"><span class="loadbar-inner absolute h-full w-2/5 bg-gold"></span></div>
      <div class="text-[10.5px] text-slate-500 mt-1.5">{{ statusMsg }}</div>
    </div>
  </div>

  <!-- 即時重大訊息跑馬燈 -->
  <div v-if="settings.showTicker" @click="modal={type:'newsListModal'}" class="sticky top-0 z-20 bg-surface2 border-b border-line px-3 py-1.5 flex items-center gap-2.5 cursor-pointer overflow-hidden">
    <span class="flex-none flex items-center gap-1 text-[10px] text-up font-semibold">
      <span class="w-1.5 h-1.5 rounded-full bg-up" style="box-shadow:0 0 6px currentColor"></span>即時訊息
    </span>
    <div class="flex-1 overflow-hidden">
      <div v-if="allNewsFlat.length" class="ticker-track text-[11.5px] text-slate-300">
        <span v-for="(n,idx) in allNewsFlat.slice(0,15)" :key="idx" class="mr-10">【{{ n.stockName }}】{{ n.title }}</span>
        <span v-for="(n,idx) in allNewsFlat.slice(0,15)" :key="'dup'+idx" class="mr-10">【{{ n.stockName }}】{{ n.title }}</span>
      </div>
      <div v-else class="text-[11.5px] text-slate-500">尚無訊息，請按「更新資料」取得最新個股新聞</div>
    </div>
  </div>

  <!-- ============ DASHBOARD ============ -->
  <template v-if="tab==='dashboard'">
    <div :class="['mx-4 mt-3 rounded-2xl p-4 border relative overflow-hidden', regimeBuyMode ? 'bg-gradient-to-br from-up/15 to-up/0 border-up/35' : 'bg-gradient-to-br from-down/15 to-down/0 border-down/35']">
      <div v-if="!regimeKnown">
        <div class="text-[11px] tracking-widest text-slate-400 uppercase">大盤環境</div>
        <div class="font-disp font-bold text-xl mt-0.5">尚無足夠指數資料</div>
        <div class="text-[11px] text-slate-400 mt-2.5">請按右上「更新資料」抓取加權指數，或於設定內手動匯入。</div>
      </div>
      <div v-else>
        <div class="text-[11px] tracking-widest text-slate-400 uppercase">大盤環境（Beta 風控）</div>
        <div :class="['font-disp font-bold text-[22px] mt-0.5 flex items-center gap-2', regimeBuyMode ? 'text-up' : 'text-down']">
          <span :class="['w-2.5 h-2.5 rounded-full', regimeBuyMode ? 'bg-up' : 'bg-down']" style="box-shadow:0 0 10px currentColor"></span>
          {{ regimeBuyMode ? '買入選股模式' : '只出不進・防守模式' }}
        </div>
        <div class="flex gap-4 mt-2.5 text-[11px] text-slate-400 flex-wrap">
          <div>加權指數 <b class="font-mono text-slate-100 font-medium">{{ fmt(taiexRegime.last,0) }}</b></div>
          <div>60MA <b class="font-mono text-slate-100 font-medium">{{ fmt(taiexRegime.ma60,0) }}</b></div>
          <div>資料日 <b class="font-mono text-slate-100 font-medium">{{ taiexRegime.date }}</b></div>
        </div>
        <div v-if="taiexRegime.chg3d || taiexRegime.chg5d" class="flex gap-4 mt-1.5 text-[11px] text-slate-400 flex-wrap">
          <div v-if="taiexRegime.chg3d">3日(交易日) <b class="font-mono font-medium" :class="pctClass(taiexRegime.chg3d.pct)">{{ pctSign(taiexRegime.chg3d.pct) }}{{ fmt(taiexRegime.chg3d.pct,2) }}%</b></div>
          <div v-if="taiexRegime.chg5d">5日(交易日) <b class="font-mono font-medium" :class="pctClass(taiexRegime.chg5d.pct)">{{ pctSign(taiexRegime.chg5d.pct) }}{{ fmt(taiexRegime.chg5d.pct,2) }}%</b></div>
        </div>

        <div class="mt-3.5 pt-3.5 border-t border-white/10">
          <div class="flex items-center justify-between gap-2 flex-wrap">
            <div class="flex bg-black/25 border border-white/10 rounded-full p-0.5 text-[11px]">
              <span @click="dashChartMarket='TAIEX'" :class="['px-2.5 py-1 rounded-full cursor-pointer', dashChartMarket==='TAIEX' ? 'bg-gold text-[#1A1305] font-semibold' : 'text-slate-300']">加權(TAIEX)</span>
              <span @click="dashChartMarket='TPEx'" :class="['px-2.5 py-1 rounded-full cursor-pointer', dashChartMarket==='TPEx' ? 'bg-gold text-[#1A1305] font-semibold' : 'text-slate-300']">櫃買(報酬指數)</span>
            </div>
            <div class="text-right">
              <span class="font-mono text-sm font-semibold">{{ fmt(pointInTimeValue(dashChartMarket==='TAIEX' ? indexHistory : otcIndexHistory, dashChartAsOfDate).close,0) }}</span>
              <span class="font-mono text-[11px] ml-1" :class="pctClass(pointInTimeValue(dashChartMarket==='TAIEX' ? indexHistory : otcIndexHistory, dashChartAsOfDate).changePct)">{{ pctSign(pointInTimeValue(dashChartMarket==='TAIEX' ? indexHistory : otcIndexHistory, dashChartAsOfDate).changePct) }}{{ fmt(pointInTimeValue(dashChartMarket==='TAIEX' ? indexHistory : otcIndexHistory, dashChartAsOfDate).changePct,2) }}%</span>
            </div>
          </div>
          <div class="flex items-center gap-2 mt-2">
            <input type="date" v-model="dashChartAsOfDate" :max="taipeiDateStr()" class="flex-1 bg-black/25 border border-white/10 rounded-lg px-2.5 py-1.5 text-[11px] font-mono text-slate-200">
            <button v-if="dashChartAsOfDate" @click="clearDashChartDate" class="text-[11px] px-2.5 py-1.5 rounded-lg border border-white/10 text-slate-300 whitespace-nowrap">回到最新</button>
            <div class="flex gap-1">
              <button v-for="p in ['1M','3M','6M']" :key="p" @click="setDashChartPeriod(p)"
                class="text-[11px] px-2 py-1.5 rounded-lg border font-mono"
                :class="dashChartPeriod===p ? 'bg-gold text-[#1A1305] border-gold font-semibold' : 'border-white/10 text-slate-300'">{{ p }}</button>
            </div>
          </div>
          <div v-html="trendChartSVG(filterByPeriod(boundedBars(dashChartMarket==='TAIEX' ? indexHistory : otcIndexHistory, dashChartAsOfDate), dashChartPeriod))" class="mt-2"></div>
          <div class="text-[10.5px] text-slate-400 -mt-1">{{ dataFreshnessNote(dashChartMarket==='TAIEX' ? indexHistory : otcIndexHistory, dashChartAsOfDate) }}</div>
          <div class="text-[10.5px] text-slate-400 mt-1 flex gap-3">
            <span>期間最高 <b class="font-mono text-up font-medium">{{ fmtAxis(periodHighLow(filterByPeriod(boundedBars(dashChartMarket==='TAIEX' ? indexHistory : otcIndexHistory, dashChartAsOfDate), dashChartPeriod)).high) }}</b></span>
            <span>期間最低 <b class="font-mono text-down font-medium">{{ fmtAxis(periodHighLow(filterByPeriod(boundedBars(dashChartMarket==='TAIEX' ? indexHistory : otcIndexHistory, dashChartAsOfDate), dashChartPeriod)).low) }}</b></span>
          </div>
        </div>
      </div>
    </div>

    <!-- file:// protocol warning -->
    <div v-if="isFileProtocol" class="mx-4 mt-3 rounded-2xl p-4 border border-gold/45 bg-gold/10">
      <div class="font-disp font-bold text-base text-gold">⚠ 偵測到本機檔案模式（file://）</div>
      <div class="text-[11.5px] text-slate-300 mt-2 leading-relaxed">
        您目前是用「下載後從檔案總管開啟」的方式打開這個頁面。手機瀏覽器（尤其 Android Chrome）基於安全機制，<b class="text-gold">會直接封鎖 file:// 頁面對外發出的資料請求</b>，導致即使 FinMind API 本身正常，App 也抓不到任何資料。
      </div>
      <div class="text-[11.5px] text-slate-300 mt-2 leading-relaxed">
        解法：請改用<b class="text-gold">「點擊 Claude 對話中的檔案連結，直接在瀏覽器分頁開啟」</b>這個方式使用（網址會是 https:// 開頭），而不是下載到手機再打開。若一定要離線使用，需要透過本機網頁伺服器（例如電腦上執行 <span class="font-mono">python -m http.server</span>）以 http:// 位址開啟。
      </div>
    </div>

    <!-- Data staleness banner (7天記憶提醒) -->
    <div v-if="dataAgeDays!=null && dataAgeDays > settings.cacheMaxAgeDays" class="mx-4 mt-3 rounded-2xl p-4 border border-gold/45 bg-gold/10">
      <div class="font-disp font-bold text-base text-gold">📅 資料已 {{ dataAgeDays }} 天未更新</div>
      <div class="text-[11.5px] text-slate-300 mt-2 leading-relaxed">
        本機保存的資料是 {{ dataAgeDays }} 天前抓取的（超過設定的 {{ settings.cacheMaxAgeDays }} 天門檻），但仍會照舊顯示，方便離線查看。建議按右上角「更新資料」取得最新狀況。
      </div>
    </div>

    <!-- Fetch error summary -->
    <div v-if="lastErrors.length" class="mx-4 mt-3 rounded-2xl p-4 border border-up/40 bg-up/10">
      <div class="font-disp font-bold text-base text-up">上次更新發生錯誤</div>
      <div class="text-[11px] text-slate-300 mt-2 space-y-1 font-mono">
        <div v-for="(e,idx) in lastErrors" :key="idx">・{{ e }}</div>
      </div>
      <button @click="onRefresh()" class="w-full bg-surface2 border border-line text-slate-100 text-xs font-medium py-2 rounded-lg mt-3">重新整理再試一次</button>
    </div>

    <!-- Sector heatmap -->
    <div class="px-4 pt-5">
      <div class="flex items-baseline justify-between mb-2.5">
        <div class="font-disp font-semibold text-[17px]">供應鏈熱力圖</div>
        <div class="text-[11px] text-slate-500">盤後・依平均漲跌幅排序</div>
      </div>
      <div class="bg-surface border border-line rounded-2xl p-3.5 relative">
        <svg class="absolute inset-0 opacity-40 pointer-events-none" viewBox="0 0 200 200" preserveAspectRatio="none">
          <path d="M0,40 H70 L90,60 V140 L70,160 H0" stroke="#8A6E30" stroke-width="1" fill="none"/>
          <path d="M200,100 H130 L110,80 V20" stroke="#8A6E30" stroke-width="1" fill="none"/>
          <circle cx="70" cy="40" r="2.5" fill="#8A6E30"/><circle cx="130" cy="100" r="2.5" fill="#8A6E30"/>
        </svg>
        <div class="grid grid-cols-2 gap-2 relative z-10">
          <div v-for="s in sectorSummary" :key="s.sector" @click="openSectorDetail(s.sector)"
            class="rounded-xl p-2.5 border border-line min-h-[86px] flex flex-col justify-between cursor-pointer"
            :style="{background: heatBg(s.avgChange)}">
            <div class="flex justify-between items-start">
              <div>
                <div class="text-xs font-semibold">{{ s.sector.replace(/（.*）/,'') }}</div>
                <div class="text-[9.5px] text-slate-500 mt-0.5">{{ s.triggers }}/{{ s.total }} 觸發</div>
              </div>
              <div class="font-mono text-[15px] font-semibold" :class="pctClass(s.avgChange)">{{ pctSign(s.avgChange) }}{{ fmt(s.avgChange,1) }}%</div>
            </div>
            <svg v-if="sectorTrendSpark(s.sector)" class="w-full h-6 mt-1" viewBox="0 0 280 42" preserveAspectRatio="none" v-html="sectorTrendSpark(s.sector)"></svg>
            <div v-else class="text-[9px] text-slate-600 mt-1">走勢資料建置中</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Data status -->
    <div class="px-4 pt-5">
      <div class="font-disp font-semibold text-[17px] mb-2.5">資料狀態</div>
      <div class="bg-surface border border-line rounded-2xl p-3.5">
        <div v-for="row in statusRows" :key="row.key" @click="openDataStatusDetail(row.key)" class="flex items-center justify-between py-2.5 border-b border-line last:border-b-0 cursor-pointer active:opacity-70">
          <div><div class="text-[13px]">{{ row.name }}</div><div class="text-[10.5px] text-slate-500 mt-0.5">{{ row.meta }}</div></div>
          <div class="flex items-center gap-2">
            <span class="text-[10px] font-mono" :class="row.ok ? 'text-cyan' : 'text-gold'">{{ row.ok ? '已就緒' : '待更新' }}</span>
            <div :class="['w-[7px] h-[7px] rounded-full', row.ok ? 'bg-cyan' : 'bg-gold']"></div>
            <svg class="w-3.5 h-3.5 text-slate-600" viewBox="0 0 24 24" fill="none"><path d="M9 6l6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </div>
        </div>
      </div>
      <div class="text-[11px] text-slate-500 mt-2 leading-relaxed">
        資料來源：<b class="text-slate-300">FinMind 開放 API</b>（個股股價／三大法人）＋<b class="text-slate-300">TWSE 牌告指數</b>（加權指數，與新聞看到的數字一致）。免費額度為 300 次/小時（填入 Token 可提升至 600 次/小時），行動網路環境仍可能因流量限制或連線問題失敗；失敗時可於「設定」以 CSV 匯入歷史K線作為備援。
      </div>
    </div>
  </template>

  <!-- ============ SCREENER ============ -->
  <template v-if="tab==='screener'">
    <div class="px-4 pt-4">
      <div class="flex items-baseline justify-between mb-2.5">
        <div class="font-disp font-semibold text-[17px]">今日選股清單</div>
        <div class="text-[11px] text-slate-500">{{ buySignals.length }} 檔通過完整條件</div>
      </div>
      <div v-if="regimeKnown && !regimeBuyMode" class="bg-surface border border-down/40 rounded-2xl p-3.5 mb-2.5">
        <b class="text-down">大盤防守模式已啟動</b>
        <div class="text-[11px] text-slate-500 mt-1.5">加權指數跌破60日線，系統暫停新增買入建議，以下清單僅供觀察參考。</div>
      </div>
      <div v-if="buySignals.length===0" class="py-9 px-5 text-center text-slate-500 text-[13px] leading-relaxed">
        目前無個股同時符合技術面＋籌碼面條件。<br><b class="text-slate-400">提醒</b>：請先於「設定」更新資料或匯入歷史K線。
      </div>
      <StockCard v-for="a in buySignals" :key="a.code" :a="a" @click="openStockDetail(a)"/>

      <template v-if="watchList.length">
        <div class="font-disp font-semibold text-[15px] text-slate-400 mt-5 mb-2.5">技術面觸發・籌碼待確認</div>
        <StockCard v-for="a in watchList" :key="a.code" :a="a" @click="openStockDetail(a)"/>
      </template>
    </div>
  </template>

  <!-- ============ SECTOR ============ -->
  <template v-if="tab==='sector'">
    <div class="px-4 pt-4">
      <div class="flex items-baseline justify-between mb-2.5">
        <div class="font-disp font-semibold text-[17px]">十大板塊動能排行</div>
        <div class="text-[11px] text-slate-500">依觸發密度排序</div>
      </div>
      <div v-for="(s,idx) in sectorSummaryByDensity" :key="s.sector" @click="openSectorDetail(s.sector)"
        class="bg-surface border border-line rounded-2xl p-3.5 mb-2.5 cursor-pointer">
        <div class="flex justify-between items-center">
          <div>
            <div class="text-sm font-semibold">{{ idx+1 }}. {{ s.sector }}</div>
            <div class="text-[11px] text-slate-500 mt-0.5">觀察 {{ s.total }} 檔・觸發 {{ s.triggers }} 檔</div>
          </div>
          <div class="text-right">
            <div class="font-mono text-base font-semibold" :class="pctClass(s.avgChange)">{{ pctSign(s.avgChange) }}{{ fmt(s.avgChange,1) }}%</div>
            <div class="text-[11px] text-slate-500">密度 {{ fmt(s.density*100,0) }}%</div>
          </div>
        </div>
      </div>
    </div>
  </template>

  <!-- ============ WATCHLIST ============ -->
  <template v-if="tab==='watchlist'">
    <div class="px-4 pt-4">
      <div class="flex items-baseline justify-between mb-2.5">
        <div class="font-disp font-semibold text-[17px]">重點觀察股</div>
        <div class="text-[11px] text-slate-500">{{ watchlist.length }} 檔</div>
      </div>
      <div class="text-[11px] text-slate-500 mb-3 leading-relaxed">跟持股不同，這裡是您想追蹤但還沒買進的股票，可以不限於十大板塊觀察池，任何代碼都能加入。系統一樣會抓資料並套用完整的技術面/籌碼面篩選邏輯。</div>

      <div class="bg-surface border border-line rounded-2xl p-3.5 mb-4">
        <div class="text-xs text-slate-400 mb-1.5">新增觀察股</div>
        <div class="grid grid-cols-2 gap-2">
          <input type="text" v-model="newWatchForm.code" placeholder="代碼，如 2454" class="bg-surface2 border border-line rounded-lg px-3 py-2 text-sm font-mono">
          <input type="text" v-model="newWatchForm.name" placeholder="名稱（選填，會自動帶入）" class="bg-surface2 border border-line rounded-lg px-3 py-2 text-sm font-mono">
        </div>

/* =========================================================================

async function sget(key, fallback){
  // 優先使用 Claude Artifact 的 window.storage；獨立開啟本檔案時該 API 不存在，改用 localStorage
  try{
    if(window.storage && typeof window.storage.get === 'function'){
      const r = await window.storage.get(key, false);
      return r ? JSON.parse(r.value) : fallback;
    }
  }catch(e){ /* 繼續往下試 localStorage */ }
  try{
    const raw = localStorage.getItem('twscreener:'+key);
    return raw!=null ? JSON.parse(raw) : fallback;
  }catch(e){ return fallback; }
}
async function sset(key, val){
  try{
    if(window.storage && typeof window.storage.set === 'function'){
      await window.storage.set(key, JSON.stringify(val), false);
      return true;
    }
  }catch(e){ /* 繼續往下試 localStorage */ }
  try{
    localStorage.setItem('twscreener:'+key, JSON.stringify(val));
    return true;
  }catch(e){ console.error('storage set fail', key, e); return false; }
}
async function sdel(key){
  try{
    if(window.storage && typeof window.storage.delete === 'function'){
      await window.storage.delete(key, false);
      return true;
    }
  }catch(e){ /* 繼續往下試 localStorage */ }
  try{ localStorage.removeItem('twscreener:'+key); return true; }
  catch(e){ return false; }
}

/* =========================================================================
   技術指標計算（純函式）
   ========================================================================= */
function sma(arr, period, getter){
  getter = getter || (x=>x);
  const out = new Array(arr.length).fill(null);
  let sum = 0;
  for(let i=0;i<arr.length;i++){
    sum += getter(arr[i]);
    if(i>=period) sum -= getter(arr[i-period]);
    if(i>=period-1) out[i] = sum/period;
  }
  return out;
}
function ema(values, period){
  const out = new Array(values.length).fill(null);
  const k = 2/(period+1);
  let prev = null;
  for(let i=0;i<values.length;i++){
    if(values[i]==null){ out[i]=null; continue; }
    if(prev==null){ prev = values[i]; } else { prev = values[i]*k + prev*(1-k); }
    out[i] = prev;
  }
  return out;
}
function macd(closes, fast, slow, signal){
  const emaFast = ema(closes, fast);
  const emaSlow = ema(closes, slow);
  const macdLine = closes.map((_,i)=> (emaFast[i]!=null && emaSlow[i]!=null) ? emaFast[i]-emaSlow[i] : null);
  const validStart = macdLine.findIndex(v=>v!=null);
  const trimmed = macdLine.map(v=> v==null?0:v);
  const signalLineRaw = ema(trimmed.slice(validStart), signal);
  const signalLine = new Array(closes.length).fill(null);
  signalLineRaw.forEach((v,i)=>{ signalLine[validStart+i] = v; });
  const hist = macdLine.map((v,i)=> (v!=null && signalLine[i]!=null) ? v-signalLine[i] : null);
  return {macdLine, signalLine, hist};
}
function bollinger(bars, period, mult){
  const closes = bars.map(b=>b.close);
  const mid = sma(bars, period, b=>b.close);
  const upper = new Array(bars.length).fill(null);
  const lower = new Array(bars.length).fill(null);
  const width = new Array(bars.length).fill(null);
  for(let i=0;i<bars.length;i++){
    if(i<period-1) continue;
    const slice = closes.slice(i-period+1, i+1);
    const m = mid[i];
    const variance = slice.reduce((s,c)=>s+Math.pow(c-m,2),0)/period;
    const sd = Math.sqrt(variance);
    upper[i] = m + mult*sd;
    lower[i] = m - mult*sd;
    width[i] = m!==0 ? (upper[i]-lower[i])/m : 0;
  }
  return {mid, upper, lower, width};
}
function maSlopeUp(ma, i, lookback){
  if(i-lookback<0 || ma[i]==null || ma[i-lookback]==null) return false;
  return ma[i] >= ma[i-lookback];
}

/* =========================================================================
   篩選引擎
   ========================================================================= */
function analyzeStock(bars, instFlow, settings, isDisposed){
  if(!bars || bars.length < 65) return null;
  const n = bars.length;
  const i = n-1;
  const today = bars[i], yday = bars[i-1];
  const closes = bars.map(b=>b.close);
  const ma5 = sma(bars,5,b=>b.close);
  const ma20 = sma(bars,20,b=>b.close);
  const ma60 = sma(bars,60,b=>b.close);
  const volMa5 = sma(bars,5,b=>b.volume);
  const {macdLine, signalLine, hist} = macd(closes,12,26,9);
  const boll = bollinger(bars,20,2);
  const avgVol20Lots = (sma(bars,20,b=>b.volume)[i]||0)/1000;

  const liquidityPass = avgVol20Lots > settings.liquidityMinLots;
  if(!liquidityPass) return {liquidityPass:false};

  const todayVolLots = today.volume/1000;
  const volRatio = volMa5[i] ? today.volume/volMa5[i] : 0;
  const vol20Max = Math.max(...bars.slice(i-19,i+1).map(b=>b.volume)) === today.volume;

  const aboveMa60 = ma60[i]!=null && today.close > ma60[i];
  const goldenCrossToday = ma5[i-1]!=null && ma20[i-1]!=null && ma5[i]!=null && ma20[i]!=null &&
    ma5[i-1] <= ma20[i-1] && ma5[i] > ma20[i];
  const absVolPass = todayVolLots > settings.triggerVolMinLots;
  const relVolPass = volRatio > settings.volRatioMin && vol20Max;

  const boWidths = boll.width.slice(Math.max(0,i-settings.bollCompressWindow+1), i+1).filter(w=>w!=null);
  const minWidthIdx = boWidths.length ? boWidths.indexOf(Math.min(...boWidths)) : -1;
  const wasCompressedRecently = minWidthIdx >= 0 && (boWidths.length-1-minWidthIdx) <= 5;
  const expandingNow = boll.width[i]!=null && boWidths.length && boll.width[i] > Math.min(...boWidths)*1.2;
  const bollBreakout = boll.upper[i]!=null && today.close > boll.upper[i];
  const bollSqueezeExpand = wasCompressedRecently && expandingNow;
  const bollCondition = bollBreakout || bollSqueezeExpand;

  const strongBreakout = aboveMa60 && goldenCrossToday && absVolPass && relVolPass && bollCondition;

  const ma60Slope5 = maSlopeUp(ma60, i, 5);
  const brokeAboveMa60Today = ma60[i-1]!=null && today.close > ma60[i] && yday.close <= (ma60[i-1]);
  const gc1 = ma60Slope5 && brokeAboveMa60Today && volRatio > 1.0;

  const ma60Slope10 = maSlopeUp(ma60, i, 10);
  let touchedMa60Recently = false;
  for(let k=Math.max(1,i-4); k<=i; k++){
    if(ma60[k]!=null && bars[k].low <= ma60[k]*1.015 && bars[k].close >= ma60[k]*0.99) { touchedMa60Recently = true; break; }
  }
  const heldAboveMa60 = bars.slice(Math.max(0,i-2),i+1).every(b=> ma60[i]!=null && b.close >= ma60[i]*0.985);
  const bouncingRed = today.close > yday.close && today.close > (ma60[i]||0)*1.005;
  const gc3 = ma60Slope10 && touchedMa60Recently && heldAboveMa60 && bouncingRed;

  const technicalTrigger = strongBreakout || gc1 || gc3;

  let instTrustStreak=false, instConcentration=false, instBothBuy=false, concPct=0;
  if(instFlow && instFlow.length){
    const sorted = instFlow.slice().sort((a,b)=>a.date.localeCompare(b.date));
    const lastN = sorted.slice(-settings.instTrustStreakDays);
    instTrustStreak = lastN.length===settings.instTrustStreakDays &&
      lastN.every(d=> (d.trust_net||0) > settings.instTrustMinLots*1000);
    const windowD = sorted.slice(-settings.instConcWindow);
    const cumInst = windowD.reduce((s,d)=> s + (d.trust_net||0) + (d.foreign_net||0), 0);
    const cumVol = bars.slice(Math.max(0,i-settings.instConcWindow+1), i+1).reduce((s,b)=>s+b.volume,0);
    concPct = cumVol>0 ? (cumInst/cumVol)*100 : 0;
    instConcentration = concPct > settings.instConcMinPct;
    const todayFlow = sorted[sorted.length-1];
    instBothBuy = todayFlow && (todayFlow.foreign_net||0)>0 && (todayFlow.trust_net||0)>0;
  }
  const chipConditionMet = instTrustStreak || instConcentration || instBothBuy;

  const finalBuySignal = technicalTrigger && chipConditionMet && !isDisposed;
  const watchOnly = technicalTrigger && !chipConditionMet && !isDisposed;

  return {
    liquidityPass:true, avgVol20Lots, todayVolLots, volRatio,
    aboveMa60, goldenCrossToday, absVolPass, relVolPass, bollCondition, bollBreakout, bollSqueezeExpand,
    strongBreakout, gc1, gc3, technicalTrigger,
    instTrustStreak, instConcentration, instBothBuy, concPct, chipConditionMet,
    finalBuySignal, watchOnly, isDisposed,
    close: today.close, prevClose: yday.close, changePct: yday.close ? (today.close-yday.close)/yday.close*100 : 0,
    ma5:ma5[i], ma20:ma20[i], ma60:ma60[i],
    macd: hist[i], closesForSpark: closes.slice(-30),
  };
}

function evaluateHolding(bars, entryPrice, settings){
  const i = bars.length-1;
  const ma60 = sma(bars,60,b=>b.close)[i];
  const boll = bollinger(bars,20,2);
  const today = bars[i];
  const gainPct = entryPrice ? (today.close-entryPrice)/entryPrice*100 : 0;
  const stopLoss = ma60!=null && today.close < ma60;
  const backInsideBand = boll.upper[i]!=null && today.close < boll.upper[i];
  const priorHighAboveBand = bars.slice(Math.max(0,i-5),i).some((b,idx)=> boll.upper[i-5+idx]!=null && b.close > boll.upper[i-5+idx]);
  const trailTakeProfit = gainPct >= settings.profitTarget && backInsideBand && priorHighAboveBand;
  return {gainPct, ma60, stopLoss, trailTakeProfit, close:today.close};
}

function dateStr(d){ return d.toISOString().slice(0,10); }
function taipeiNow(){
  // 不論使用者裝置時區為何，一律以台北(UTC+8)為準
  const now = new Date();
  const utcMs = now.getTime() + now.getTimezoneOffset()*60000;
  return new Date(utcMs + 8*3600000);
}
function taipeiDateStr(){
  const t = taipeiNow();
  return `${t.getFullYear()}-${pad2(t.getMonth()+1)}-${pad2(t.getDate())}`;
}
function daysAgo(n){ const d = taipeiNow(); d.setDate(d.getDate()-n); return dateStr(d); }

async function fmGet(dataset, params, token){
  const url = new URL(FINMIND_URL);
  url.searchParams.set('dataset', dataset);
  Object.entries(params||{}).forEach(([k,v])=>{ if(v!=null && v!=='') url.searchParams.set(k, v); });
  const headers = {};
  if(token) headers['Authorization'] = 'Bearer ' + token;
  const res = await fetch(url.toString(), {headers});
  const json = await res.json();
  if(json.status !== 200) throw new Error(json.msg || ('FinMind status '+json.status));
  return json.data || [];
}

function pad2(n){ return n<10?('0'+n):(''+n); }
function toMinguo(y,m,d){ return (y-1911)+'/'+pad2(m)+(d?('/'+pad2(d)):''); }

async function fetchTWSEStockMonth(code, year, month){
  const dstr = `${year}${pad2(month)}01`;
  const url = `https://www.twse.com.tw/exchangeReport/STOCK_DAY?response=json&date=${dstr}&stockNo=${code}`;
  const res = await fetch(url);

  return j.data.map(row=>{
    const [rocDate, vol, , open, high, low, close] = row;
    const [ry, rm, rd] = rocDate.split('/').map(Number);
    return { date: `${ry+1911}-${pad2(rm)}-${pad2(rd)}`, open:parseFloat(open), high:parseFloat(high), low:parseFloat(low), close:parseFloat(close), volume: parseInt(String(vol).replace(/,/g,''),10)||0 };
  }).filter(b=>!isNaN(b.close));
}
async function fetchTPExStockMonth(code, year, month){
  const url = `https://www.tpex.org.tw/web/stock/aftertrading/daily_trading_info/st43_result.php?l=zh-tw&d=${toMinguo(year,month)}&stkno=${code}`;
  const res = await fetch(url);

  }).filter(b=>!isNaN(b.close));
}

async function fetchIndexTWSEFallback(){
  let bars = [];
  const now = new Date();
  for(let k=6;k>=0;k--){
    const d = new Date(now.getFullYear(), now.getMonth()-k, 1);
    const dstr = `${d.getFullYear()}${pad2(d.getMonth()+1)}01`;

async function fetchInstFlowTWSEFallback(code){
  // 僅能拿到最近一個交易日（T86 為單日全市場快照），聊勝於無：可用於「土洋同買」判斷，
  // 但無法支援投信連買天數／籌碼集中度等需要多日數列的條件。
  const now = new Date();
  let d = new Date(now);
  for(let attempt=0; attempt<5; attempt++){
    const dstr = `${d.getFullYear()}${pad2(d.getMonth()+1)}${pad2(d.getDate())}`;
    try{
      const url = `https://www.twse.com.tw/fund/T86?response=json&date=${dstr}&selectType=ALL`;
      const res = await fetch(url); const j = await res.json();
      if(j.data){
        const row = j.data.find(r=>r[0]===code);
        if(row){
          const foreign_net = parseInt(String(row[4]).replace(/,/g,''),10)||0;
          const trust_net = parseInt(String(row[7]).replace(/,/g,''),10)||0;
          return [{date: `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`, foreign_net, trust_net}];
        }
      }
    }catch(e){ /* 非交易日或失敗，往前一天再試 */ }
    d.setDate(d.getDate()-1);
    await sleepMs(120);
  }
  return [];
}

/* 依序嘗試 FinMind -> TWSE 備援 -> TPEx 備援，回傳 {bars, source} */
async function fetchStockPriceWithFallback(code, token){

  catch(eFM){
    try{
      const bars = await fetchStockPriceTWSEFallback(code);
      if(bars.length>=20) return { bars, source:'TWSE備援' };

    }catch(eTWSE){

        const bars = await fetchStockPriceTPExFallback(code);
        if(bars.length>=20) return { bars, source:'TPEx備援' };

      }catch(eTPEx){

      }
    }
  }
}
async function fetchIndexWithFallback(dataId, token){
  if(dataId==='TAIEX'){
    // 加權指數一律以 TWSE 牌告指數(發行量加權股價指數)為主，這是大家平常看到的數字；
    // FinMind 的 TaiwanStockTotalReturnIndex 是「報酬指數」(含股利再投資的累積指數)，
    // 數字會大很多，是完全不同的指標，不能混用，因此加權指數不使用該資料集。
    try{

    }catch(eTWSE){
      throw new Error(`TWSE牌告指數取得失敗(${eTWSE.message||eTWSE})`);
    }

  // 暫以 FinMind 報酬指數代用，UI 會明確標示這是報酬指數而非牌告指數。
  try{ return { bars: await withRetry(()=>fetchIndexFM(dataId, token), 2, 700), source:'FinMind(報酬指數，非牌告指數)' }; }

}
async function fetchInstFlowWithFallback(code, token){
  try{ const flow = await withRetry(()=>fetchInstFlowFM(code, token), 2, 700); return {flow, source:'FinMind'}; }
  catch(eFM){
    try{
      const flow = await fetchInstFlowTWSEFallback(code);
      if(flow.length) return {flow, source:'TWSE備援(僅單日)'};

    }catch(eTWSE){ throw new Error(`FinMind(${eFM.message||eFM})／TWSE(${eTWSE.message||eTWSE}) 皆失敗`); }
  }
}

async function sleepMs(ms){ return new Promise(r=>setTimeout(r,ms)); }

/* =========================================================================
   GitHub 同步：把抓到的資料快取（歷史K線/法人/新聞/指數）存回 GitHub repo 的
   一個 JSON 檔案，讓手機、電腦等不同裝置能透過同一個 repo 共用最新資料，
   不用每個裝置各自重新向 FinMind 抓一次。
   ========================================================================= */
function b64EncodeUnicode(str){
  return btoa(encodeURIComponent(str).replace(/%([0-9A-F]{2})/g, (m,p)=>String.fromCharCode('0x'+p)));
}
function b64DecodeUnicode(str){
  return decodeURIComponent(atob(str).split('').map(c=>'%'+('00'+c.charCodeAt(0).toString(16)).slice(-2)).join(''));
}
async function githubGetFile(owner, repo, path, branch, token){
  const url = `https://api.github.com/repos/${owner}/${repo}/contents/${encodeURIComponent(path)}?ref=${encodeURIComponent(branch)}`;
  const headers = {Accept:'application/vnd.github+json'};
  if(token) headers['Authorization'] = 'Bearer '+token;
  const res = await fetch(url, {headers});
  if(res.status===404) return null;
  if(!res.ok) throw new Error('GitHub 讀取失敗 HTTP '+res.status);
  const j = await res.json();
  return { sha: j.sha, content: JSON.parse(b64DecodeUnicode(j.content.replace(/\n/g,''))) };
}
async function githubPutFile(owner, repo, path, branch, token, dataObj, sha){
  if(!token) throw new Error('缺少 GitHub Token，無法寫入');
  const url = `https://api.github.com/repos/${owner}/${repo}/contents/${encodeURIComponent(path)}`;
  const body = {
    message: `chore: 更新資料快取 ${dataObj.syncedAt}`,
    content: b64EncodeUnicode(JSON.stringify(dataObj)),
    branch,
  };
  if(sha) body.sha = sha;
  const res = await fetch(url, {
    method:'PUT',
    headers: {Accept:'application/vnd.github+json', 'Authorization':'Bearer '+token, 'Content-Type':'application/json'},
    body: JSON.stringify(body),
  });
  if(!res.ok){ const t = await res.text().catch(()=> ''); throw new Error('GitHub 寫入失敗 HTTP '+res.status+' '+t.slice(0,200)); }
  return await res.json();
}
async function withRetry(fn, retries, delayMs){
  retries = retries==null?2:retries; delayMs = delayMs==null?700:delayMs;
  let lastErr;
  for(let i=0;i<=retries;i++){
    try{ return await fn(); }
    catch(e){ lastErr = e; if(i<retries) await sleepMs(delayMs*(i+1)); }
  }
  throw lastErr;
}
async function pMapLimit(items, limit, fn){
  const results = new Array(items.length);
  let idx = 0;
  async function worker(){
    while(idx < items.length){
      const cur = idx++;
      try{ results[cur] = await fn(items[cur], cur); }
      catch(e){ results[cur] = {error:true, message:String(e.message||e)}; }
    }
  }
  const workers = Array.from({length:Math.min(limit, items.length)}, worker);
  await Promise.all(workers);
  return results;
}

      const min=Math.min(...values), max=Math.max(...values);

      const step=(w-pad*2)/(values.length-1);

    function boundedBars(bars, asOfDate){

      if(!d) return bars;

    function clearChartDate(){ state.chartAsOfDate = ''; }
    function clearDashChartDate(){ state.dashChartAsOfDate = ''; }

      const cutoff = new Date(); cutoff.setDate(cutoff.getDate()-days);
      const cutoffStr = dateStr(cutoff);
      const sliced = bars.filter(b=>b.date>=cutoffStr);
      return sliced.length>=2 ? sliced : bars.slice(-Math.min(bars.length,10));

    function trendChartSVG(bars){
      if(!bars || bars.length<2) return '';

      const range=(max-min)||1;
      const stepX=(w-padL-padR)/(bars.length-1);
      const X=i=>padL+i*stepX;
      const Y=v=>padT+(h-padT-padB)-((v-min)/range)*(h-padT-padB);
      const pts=bars.map((b,i)=>`${X(i).toFixed(1)},${Y(b.close).toFixed(1)}`).join(' ');
      const up = closes[closes.length-1]>=closes[0];

      const ticks = tickIdxs.map((idx,k)=>`<text x="${X(idx).toFixed(1)}" y="${h-6}" font-size="8" fill="#5C6A7A" text-anchor="${anchors[k]}" font-family="IBM Plex Mono, monospace">${bars[idx].date.slice(5)}</text>`).join('');

      const maxIdx = closes.indexOf(max), minIdx = closes.indexOf(min);

        ${ticks}
      </svg>`;

    function dataFreshnessNote(bars, asOfDate){
      if(!bars || !bars.length) return '尚無資料';
      const d = asOfDate!==undefined ? asOfDate : state.chartAsOfDate;
      const b = boundedBars(bars, d);

      const todayStr = taipeiDateStr();
      if(d){
        return `顯示 ${d} 當天（或最近一個交易日 ${lastDate}）的歷史資料，非即時`;
      }
      if(lastDate === todayStr) return `資料日期 ${lastDate}（今日盤後，台北時間）`;
      return `資料日期 ${lastDate}（非即時，台股目前非開盤時段或尚未更新，顯示為最近一個交易日的收盤資料，以台北時間判斷）`;
    }
    function setChartPeriod(p){ state.chartPeriod = p; }
    function instFlowSum(code, field){
      const flow = state.instFlows[code];
      if(!flow || !flow.length) return 0;
      return flow.slice(-5).reduce((s,d)=>s+(d[field]||0),0);
    }

    /* ---------- persistence ---------- */
    async function saveSettings(){ await sset('settings', state.settings); runScreen(); setupAutoRefresh(); }
    async function saveSectors(){ await sset('sector-stocks', state.sectors); }
    async function saveDisposition(){ await sset('disposition-list', state.disposition); runScreen(); }
    async function saveHoldings(){ await sset('holdings', state.holdings); }
    async function persistHistories(){
      for(const code of Object.keys(state.histories)) await sset('history-'+code, state.histories[code]);
      for(const code of Object.keys(state.instFlows)) await sset('inst-'+code, state.instFlows[code]);
      for(const code of Object.keys(state.news)) await sset('news-'+code, state.news[code]);
      await sset('index-history', state.indexHistory);
      await sset('otc-index-history', state.otcIndexHistory);
      await sset('stock-info', state.stockInfo);
    }

    function githubConfigured(needToken){
      const s = state.settings;
      if(!s.githubSyncEnabled || !s.githubOwner || !s.githubRepo) return false;
      return needToken ? !!s.githubToken : true;
    }
    function buildSyncSnapshot(){
      // 精簡內容：每檔股票只留最近90天K線、近5日法人、近5則新聞，避免檔案過大
      const trimHist = {};
      Object.entries(state.histories).forEach(([c,b])=>{ trimHist[c] = (b||[]).slice(-90); });
      const trimInst = {};
      Object.entries(state.instFlows).forEach(([c,f])=>{ trimInst[c] = (f||[]).slice(-15); });
      const trimNews = {};
      Object.entries(state.news).forEach(([c,n])=>{ trimNews[c] = (n||[]).slice(0,5); });
      return {
        syncedAt: new Date().toISOString(),
        syncedAtTaipei: taipeiDateStr(),
        indexHistory: (state.indexHistory||[]).slice(-90),
        otcIndexHistory: (state.otcIndexHistory||[]).slice(-90),
        histories: trimHist,
        instFlows: trimInst,
        news: trimNews,
      };
    }
    async function pushToGitHub(){
      if(!githubConfigured(true)) return;
      const { githubOwner:owner, githubRepo:repo, githubBranch:branch, githubToken:token, githubDataPath:path } = state.settings;
      try{
        state.githubSyncStatus = '同步至 GitHub...';
        let existing = null;
        try{ existing = await githubGetFile(owner, repo, path, branch, token); }catch(e){ /* 檔案可能還不存在 */ }
        const snapshot = buildSyncSnapshot();
        await githubPutFile(owner, repo, path, branch, token, snapshot, existing?existing.sha:null);
        state.githubSyncStatus = `已同步至 GitHub（${snapshot.syncedAtTaipei}）`;
        await sset('github-last-sync', snapshot.syncedAt);
      }catch(e){
        state.githubSyncStatus = 'GitHub 同步失敗：'+(e.message||e);
        pushError('GitHub 同步失敗：'+(e.message||e));
      }
    }
    async function pullFromGitHub(){
      if(!githubConfigured(false)) return false;
      const { githubOwner:owner, githubRepo:repo, githubBranch:branch, githubToken:token, githubDataPath:path } = state.settings;
      try{
        const remote = await githubGetFile(owner, repo, path, branch, token);
        if(!remote || !remote.content) return false;
        const remoteData = remote.content;
        const localTs = await sget('github-last-sync', null);
        // 只有「GitHub 上的資料比本機記得的更新」時，才採用並覆蓋本機，避免舊資料蓋掉新資料
        if(localTs && remoteData.syncedAt && remoteData.syncedAt <= localTs) return false;
        Object.entries(remoteData.histories||{}).forEach(([c,b])=>{
          const localBars = state.histories[c];
          if(!localBars || !localBars.length || (b.length && b[b.length-1].date > localBars[localBars.length-1].date)){
            state.histories[c] = b;
          }
        });
        Object.entries(remoteData.instFlows||{}).forEach(([c,f])=>{
          const localFlow = state.instFlows[c];
          if(!localFlow || !localFlow.length) state.instFlows[c] = f;
        });
        Object.entries(remoteData.news||{}).forEach(([c,n])=>{
          const existing = state.news[c]||[];
          const seenLinks = new Set(existing.map(x=>x.link));
          state.news[c] = existing.concat((n||[]).filter(x=>!seenLinks.has(x.link))).slice(0,20);
        });
        if(remoteData.indexHistory && remoteData.indexHistory.length &&
           (!state.indexHistory.length || remoteData.indexHistory[remoteData.indexHistory.length-1].date > state.indexHistory[state.indexHistory.length-1].date)){
          state.indexHistory = remoteData.indexHistory;
        }
        if(remoteData.otcIndexHistory && remoteData.otcIndexHistory.length &&
           (!state.otcIndexHistory.length || remoteData.otcIndexHistory[remoteData.otcIndexHistory.length-1].date > state.otcIndexHistory[state.otcIndexHistory.length-1].date)){
          state.otcIndexHistory = remoteData.otcIndexHistory;
        }
        await sset('github-last-sync', remoteData.syncedAt);
        await persistHistories();
        state.githubSyncStatus = `已從 GitHub 取得較新資料（${remoteData.syncedAtTaipei||''}）`;
        return true;
      }catch(e){
        state.githubSyncStatus = 'GitHub 讀取失敗：'+(e.message||e);
        return false;
      }
    }
    async function manualGithubSync(){
      state.loading = true;
      await pullFromGitHub();
      await pushToGitHub();
      runScreen();
      state.loading = false;
      showToast(state.githubSyncStatus||'同步完成');
    }

    async function loadAll(){
      const loadedSettings = await sget('settings', null);
      state.settings = loadedSettings ? {...DEFAULT_SETTINGS, ...loadedSettings} : {...DEFAULT_SETTINGS};
      state.sectors = await sget('sector-stocks', JSON.parse(JSON.stringify(DEFAULT_SECTORS)));
      state.disposition = await sget('disposition-list', []);
      state.holdings = await sget('holdings', []);
      state.watchlist = await sget('watchlist', []);
      state.indexHistory = await sget('index-history', []);
      state.otcIndexHistory = await sget('otc-index-history', []);
      state.stockInfo = await sget('stock-info', {});
      state.lastUpdateTs = await sget('last-update-ts', null);
      for(const s of allTrackedStocks.value){
        const h = await sget('history-'+s.code, null); if(h) state.histories[s.code]=h;
        const f = await sget('inst-'+s.code, null); if(f) state.instFlows[s.code]=f;
        const n = await sget('news-'+s.code, null); if(n) state.news[s.code]=n;
      }
      if(githubConfigured(false)){
        try{ await pullFromGitHub(); }catch(e){ /* 開機時同步失敗不阻斷主流程 */ }
      }
      runScreen();
    }

    /* ---------- refresh from FinMind ---------- */
    function pushError(msg){
      state.lastErrors.push(msg);
      if(state.lastErrors.length>8) state.lastErrors.shift();
    }

    async function onRefresh(isAuto){
      if(state.loading) return;
      state.loading = true;
      state.lastErrors = [];
      const token = state.settings.finmindToken || '';
      let successCount = 0, failCount = 0;
      const sourceCounts = {};
      const noteSource = (src)=>{ sourceCounts[src] = (sourceCounts[src]||0)+1; };
      try{
        if(state.isFileProtocol){
          pushError('目前為 file:// 本機檔案模式，瀏覽器可能封鎖所有網路請求，請改用 https 連結開啟本頁');
        }

        // 自動更新時，先用不受 FinMind 額度限制的 TWSE 指數做「有沒有新資料」的輕量探測；
        // 若沒有新的交易日資料出現，就不做整批個股重抓，避免每5分鐘就浪費一次 API 額度。
        if(isAuto && Object.keys(state.histories).length>0){
          try{
            const probe = await fetchIndexTWSEFallback();
            const newLatest = probe.length ? probe[probe.length-1].date : null;
            const oldLatest = state.indexHistory.length ? state.indexHistory[state.indexHistory.length-1].date : null;
            if(newLatest){ state.indexHistory = probe; }
            if(newLatest && newLatest===oldLatest){
              state.loading = false;
              return; // 沒有新交易日資料，本次自動更新略過，靜默結束
            }
          }catch(e){ /* 探測失敗就照常走完整流程 */ }
        }

        state.statusMsg = '更新台股總覽資料...';
        try{ state.stockInfo = await withRetry(()=>fetchStockInfoFM(token), 2, 700); }
        catch(e){ pushError('股票總覽取得失敗：'+(e.message||e)); }

        state.statusMsg = '更新加權指數...';
        try{ const r = await fetchIndexWithFallback('TAIEX', token); state.indexHistory = r.bars; noteSource(r.source); }
        catch(e){ pushError('加權指數取得失敗：'+(e.message||e)); }
        try{ const r = await fetchIndexWithFallback('TPEx', token); state.otcIndexHistory = r.bars; noteSource(r.source); }
        catch(e){ pushError('櫃買報酬指數取得失敗：'+(e.message||e)); }

        const stocks = allTrackedStocks.value;
        const todayStr = taipeiDateStr();
        let done = 0, skipped = 0;
        await pMapLimit(stocks, 2, async (s)=>{
          state.statusMsg = `更新個股資料 ${done+1}/${stocks.length}：${s.name}`;
          const existingBars = state.histories[s.code];
          const priceFresh = !state.forceFullRefresh && existingBars && existingBars.length && existingBars[existingBars.length-1].date === todayStr;
          if(priceFresh){ successCount++; skipped++; }
          else{
            try{
              const r = await fetchStockPriceWithFallback(s.code, token);
              if(r.bars.length>=20){ state.histories[s.code] = r.bars; successCount++; noteSource(r.source); }
              else { failCount++; pushError(`${s.name}(${s.code}) 股價資料筆數不足`); }
            }catch(e){ failCount++; pushError(`${s.name}(${s.code}) 股價取得失敗：`+(e.message||e)); }
            await sleepMs(200);
          }
          const existingFlow = state.instFlows[s.code];
          const flowFresh = !state.forceFullRefresh && existingFlow && existingFlow.length && existingFlow[existingFlow.length-1].date === todayStr;
          if(!flowFresh){
            try{
              const r = await fetchInstFlowWithFallback(s.code, token);
              if(r.flow.length){ state.instFlows[s.code] = r.flow; noteSource(r.source); }
            }catch(e){ pushError(`${s.name}(${s.code}) 法人資料取得失敗：`+(e.message||e)); }
          }
          if(state.settings.showTicker){
            try{
              const items = await withRetry(()=>fetchNewsFM(s.code, token), 1, 700);
              const existing = state.news[s.code] || [];
              const seenLinks = new Set(existing.map(n=>n.link));
              const merged = existing.concat(items.filter(n=>!seenLinks.has(n.link)));
              merged.sort((a,b)=>b.date.localeCompare(a.date));
              state.news[s.code] = merged.slice(0,20);
            }catch(e){ /* 新聞為非必要功能，失敗不影響主流程也不列入錯誤訊息 */ }
          }
          done++;
        });
        state.forceFullRefresh = false;
        if(skipped>0) pushError(`（${skipped} 檔今日已是最新資料，自動略過重抓，節省 API 額度）`);
        Object.entries(sourceCounts).forEach(([src,cnt])=>{
          if(src!=='FinMind') pushError(`（${cnt} 項改用 ${src} 取得，FinMind 當下無法使用）`);
        });
        state.lastUpdateTs = Date.now();
        await sset('last-update-ts', state.lastUpdateTs);

        await persistHistories();

        // 只有「這次真的抓到新資料」(扣掉單純跳過的部分還有成功次數)才推送到 GitHub，
        // 避免資料沒有變動時還一直寫入 repo
        const gotNewData = (successCount - skipped) > 0;
        if(gotNewData && githubConfigured(true)){
          await pushToGitHub();
        }

        runScreen();
        if(successCount===0 && stocks.length>0){
          showToast('更新失敗：所有股票都抓不到資料，請看總覽頁的錯誤訊息');
        }else{
          showToast(`資料更新完成（成功 ${successCount}／失敗 ${failCount}）`);
        }
      }catch(e){
        pushError('更新流程發生未預期錯誤：'+(e.message||e));
        showToast('更新時發生錯誤：'+(e.message||e));
      }finally{
        state.loading = false;
        state.statusMsg = '';
      }
    }

    /* ---------- settings / sector pool / disposition ---------- */
    function addStock(sector){
      const code = (state.newStockForm[sector+'_code']||'').trim();
      const name = (state.newStockForm[sector+'_name']||'').trim();
      if(!code || !name) return;
      state.sectors[sector].push({code, name});
      state.newStockForm[sector+'_code']=''; state.newStockForm[sector+'_name']='';
      saveSectors(); showToast(`已加入 ${name}`);
    }
    function removeStock(sector, idx){ state.sectors[sector].splice(idx,1); saveSectors(); }
    function addDisposition(){
      const code = state.dispInput.trim();
      if(!code) return;
      if(!state.disposition.includes(code)) state.disposition.push(code);
      state.dispInput=''; saveDisposition(); showToast('已加入處置股清單');
    }
    function removeDisposition(idx){ state.disposition.splice(idx,1); saveDisposition(); }

    function importCSV(){
      const txt = state.csvInput.trim();
      if(!txt) return;
      let count=0;
      txt.split('\n').map(l=>l.trim()).filter(Boolean).forEach(line=>{
        const parts = line.split(',').map(p=>p.trim());
        if(parts.length<7) return;
        const [code,date,open,high,low,close,volume] = parts;
        if(!state.histories[code]) state.histories[code]=[];
        const idxE = state.histories[code].findIndex(b=>b.date===date);
        const bar = {date, open:parseFloat(open), high:parseFloat(high), low:parseFloat(low), close:parseFloat(close), volume:parseInt(volume,10)};
        if(idxE>=0) state.histories[code][idxE]=bar; else state.histories[code].push(bar);
        count++;
      });
      Object.keys(state.histories).forEach(code=> state.histories[code].sort((a,b)=>a.date.localeCompare(b.date)));
      persistHistories(); runScreen(); showToast(`已匯入 ${count} 筆資料`);
    }
    function importIndex(){
      const txt = state.idxInput.trim();
      if(!txt) return;
      txt.split('\n').map(l=>l.trim()).filter(Boolean).forEach(line=>{
        const [date, close] = line.split(',').map(p=>p.trim());
        const idxE = state.indexHistory.findIndex(b=>b.date===date);
        const bar = {date, close:parseFloat(close)};
        if(idxE>=0) state.indexHistory[idxE]=bar; else state.indexHistory.push(bar);
      });
      state.indexHistory.sort((a,b)=>a.date.localeCompare(b.date));
      persistHistories(); runScreen(); showToast('指數資料已匯入');
    }

    /* ---------- holdings ---------- */
    function confirmAddHolding(){
      const { code, price, date } = state.addHoldingForm;
      if(!code || !price || !date){ showToast('請完整填寫資料'); return; }
      const stock = allTrackedStocks.value.find(s=>s.code===code);
      state.holdings.push({code, name: stock?stock.name:code, entryPrice:price, entryDate:date, dispositionAction:'clear'});
      saveHoldings(); state.modal=null; showToast('已新增持股');
    }
    function removeHolding(idx){ state.holdings.splice(idx,1); saveHoldings(); }

    /* ---------- 觀察股（非持股） ---------- */
    async function saveWatchlist(){ await sset('watchlist', state.watchlist); }
    function addWatchlist(){
      const code = state.newWatchForm.code.trim();
      let name = state.newWatchForm.name.trim();
      if(!code) { showToast('請輸入股票代碼'); return; }
      if(state.watchlist.some(w=>w.code===code)){ showToast('已在觀察清單中'); return; }
      if(!name && state.stockInfo[code]) name = state.stockInfo[code].name;
      if(!name) name = code;
      state.watchlist.push({code, name, addedDate: taipeiDateStr()});
      state.newWatchForm.code=''; state.newWatchForm.name='';
      saveWatchlist();
      showToast(state.histories[code] ? `已加入觀察：${name}` : `已加入觀察：${name}（請按「更新資料」取得股價）`);
    }
    function removeWatchlist(idx){ state.watchlist.splice(idx,1); saveWatchlist(); }

    async function resetAll(){
      if(!confirm('確定要清除所有本機資料（設定／觀察池／持股／K線快取）嗎？此操作無法復原。')) return;
      const keys = ['settings','sector-stocks','disposition-list','holdings','index-history','otc-index-history','stock-info'];
      for(const k of keys){ await sdel(k); }
      for(const code of Object.keys(state.histories)){ await sdel('history-'+code); }
      for(const code of Object.keys(state.instFlows)){ await sdel('inst-'+code); }
      location.reload();
    }

    function openStockDetail(a){ state.chartPeriod='3M'; state.chartAsOfDate=''; state.modal = {type:'stockDetail', code:a.code, data:a}; }
    function openRawStock(s){
      // 從股票池點入，不一定有完整分析結果（可能未過流動性門檻），仍可看走勢圖
      const existing = state.results.find(r=>r.code===s.code);
      state.chartPeriod='3M'; state.chartAsOfDate='';
      state.modal = {type:'stockDetail', code:s.code, data: existing || {code:s.code, name:s.name, sector:s.sector, close:null, changePct:0, watchOnly:false, finalBuySignal:false, isDisposed: state.disposition.includes(s.code)}};
    }
    function openSectorDetail(sector){ state.modal = {type:'sectorDetail', data:sector}; }
    function openDataStatusDetail(key){
      state.chartPeriod='3M'; state.chartAsOfDate='';
      if(key==='stockHistory') state.modal = {type:'stockListModal'};
      else if(key==='index'){ state.indexModalMarket='TAIEX'; state.modal = {type:'indexDetail'}; }
      else if(key==='inst') state.modal = {type:'instListModal'};
      else if(key==='disposition') state.modal = {type:'dispositionModal'};
    }

    let autoRefreshTimer = null;
    function setupAutoRefresh(){
      if(autoRefreshTimer){ clearInterval(autoRefreshTimer); autoRefreshTimer = null; }
      const minutes = Number(state.settings.autoRefreshMinutes) || 0;
      if(minutes <= 0) return;
      autoRefreshTimer = setInterval(()=>{
        if(!state.loading) onRefresh(true);
      }, minutes * 60 * 1000);
    }

    onMounted(async ()=>{
      await loadAll();
      setupAutoRefresh();
    });

    return {
      ...toRefs(state),
      fmt, pctClass, pctSign, heatBg,
      allSectorStocks, taiexRegime, otcRegime, regimeKnown, regimeBuyMode,
      buySignals, watchList, sectorSummary, sectorSummaryByDensity, statusRows, dataAgeDays,
      sectorStockResults, holdingEval, holdingBorderClass, sparkPoints, tagsHtml,
      onRefresh, saveSettings, addStock, removeStock, addDisposition, removeDisposition,
      importCSV, importIndex, confirmAddHolding, removeHolding, saveHoldings, resetAll,
      watchlistResults, allTrackedStocks, addWatchlist, removeWatchlist, allNewsFlat,
      openStockDetail, openSectorDetail, openRawStock, openDataStatusDetail,
      filterByPeriod, trendChartSVG, dataFreshnessNote, setChartPeriod, instFlowSum,
      boundedBars, pointInTimeValue, clearChartDate, taipeiDateStr,
      clearDashChartDate, setDashChartPeriod, sectorTrendSpark, fmtAxis, periodHighLow,
      manualGithubSync,
    };
  }
});
app.mount('#app');

if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('sw.js').catch(()=>{ /* 非必要功能，註冊失敗不影響主功能 */ });
  });
}
</script>
</body>
